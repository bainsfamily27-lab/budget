<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; font-weight: 400; background: #eceae4; color: #0d0d0b; min-height: 100vh; padding: 24px 20px; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; border-bottom: 1px solid rgba(0,0,0,0.12); padding-bottom: 20px; animation: fadeUp 0.4s ease both; }
  .header h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; color: #0d0d0b; letter-spacing: -0.02em; line-height: 1; }
  .grand-total-val { font-family: 'DM Serif Display', serif; font-size: 2.4rem; color: #2a6e1e; line-height: 1; text-align: right; }
  .grand-total-label { font-size: 11px; color: #555550; letter-spacing: 0.07em; text-transform: uppercase; margin-top: 4px; text-align: right; }
  .summary-grid { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 10px; margin-bottom: 20px; animation: fadeUp 0.4s 0.05s ease both; }
  .sum-card { background: #fff; border: 1px solid rgba(0,0,0,0.13); border-radius: 10px; padding: 12px 14px; }
  .sum-card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #333330; margin-bottom: 6px; }
  .sum-card-val { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: #0d0d0b; line-height: 1; }
  .sum-card-sub { font-size: 11px; color: #888; margin-top: 4px; }
  .toolbar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 14px; }
  .save-indicator { font-size: 12px; color: #2a6e1e; opacity: 0; transition: opacity 0.3s; }
  .save-indicator.visible { opacity: 1; }
  .edit-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 16px; border-radius: 20px; cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s, color 0.2s; border: 1px solid rgba(0,0,0,0.15); background: rgba(0,0,0,0.05); color: #333330; }
  .edit-btn.active { background: rgba(42,110,30,0.1); border-color: rgba(42,110,30,0.35); color: #2a6e1e; }
  .main-grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
  .categories { display: flex; flex-direction: column; gap: 14px; }
  .section { background: #fff; border: 1px solid rgba(0,0,0,0.13); border-radius: 12px; overflow: hidden; animation: fadeUp 0.35s ease both; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; min-height: 44px; border-bottom: 1px solid rgba(0,0,0,0.08); cursor: pointer; user-select: none; transition: background 0.15s; }
  .section-header:hover { background: #fafaf8; }
  .section-header.collapsed { border-bottom: none; }
  .section-title-wrap { display: flex; align-items: center; gap: 10px; }
  .section-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .section-name { font-size: 13px; font-weight: 600; color: #0d0d0b; }
  .section-right { display: flex; align-items: center; gap: 12px; }
  .section-total { font-family: 'DM Serif Display', serif; font-size: 1.05rem; font-weight: 400; }
  .chevron { color: #888; font-size: 11px; transition: transform 0.2s; }
  .chevron.collapsed { transform: rotate(-90deg); }
  .section-body { padding: 4px 0; }
  .line-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 16px; transition: background 0.1s; }
  .line-item:hover { background: #f8f7f4; }
  .line-name { font-size: 13px; color: #0d0d0b; font-weight: 450; }
  .line-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 12px; }
  .line-bar-wrap { width: 72px; height: 3px; background: rgba(0,0,0,0.07); border-radius: 2px; }
  .line-bar { height: 100%; border-radius: 2px; opacity: 0.55; }
  .line-amount { font-size: 13px; font-weight: 600; color: #0d0d0b; font-variant-numeric: tabular-nums; min-width: 72px; text-align: right; }
  .name-input, .amount-input { background: transparent; border: none; border-bottom: 1px solid rgba(0,0,0,0.15); font-family: 'DM Sans', sans-serif; color: #0d0d0b; outline: none; padding: 1px 0; font-size: 16px; }
  .name-input { font-size: 13px; flex: 1; min-width: 0; }
  .amount-input { font-size: 13px; font-weight: 600; width: 80px; text-align: right; }
  .name-input:focus, .amount-input:focus { border-bottom-color: #2a6e1e; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .remove-btn { background: none; border: none; cursor: pointer; color: #cc3333; font-size: 16px; padding: 0 4px 0 0; line-height: 1; flex-shrink: 0; }
  .add-item-btn { width: calc(100% - 32px); margin: 6px 16px 10px; background: none; border: 1px dashed rgba(0,0,0,0.2); border-radius: 6px; font-size: 12px; color: #555550; cursor: pointer; padding: 5px 12px; text-align: left; font-family: 'DM Sans', sans-serif; }
  .add-item-btn:hover { border-color: rgba(0,0,0,0.35); color: #0d0d0b; }
  .chart-panel { background: #fff; border: 1px solid rgba(0,0,0,0.13); border-radius: 12px; padding: 20px; position: sticky; top: 16px; align-self: start; animation: fadeUp 0.4s 0.1s ease both; }
  .chart-panel-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #555550; margin-bottom: 16px; }
  .donut-wrap { position: relative; height: 200px; margin-bottom: 16px; }
  .legend { display: flex; flex-direction: column; gap: 7px; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
  .legend-left { display: flex; align-items: center; gap: 7px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .legend-name { color: #555550; }
  .legend-val { font-weight: 600; color: #0d0d0b; font-variant-numeric: tabular-nums; }
  .sec-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: #0d0d0b; margin-bottom: 16px; }
  @media (max-width: 480px) {
    body { padding: 12px 10px; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .sum-card { padding: 10px 12px; }
    .sum-card-val { font-size: 1rem; }
    .rp-col-nominal { display: none !important; }
    .rp-portfolio-row { grid-template-columns: 2fr 1fr 1fr !important; }
    .rp-col-growth { display: none !important; }
    .line-bar-wrap { display: none !important; }
    .line-amount { min-width: 60px; }
    .grand-total-val { font-size: 1.7rem; }
  }
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
    .chart-panel { position: static; }
  }
  @media (max-width: 600px) {
    body { padding: 14px 12px; }
    .header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .header h1 { font-size: 1.6rem; }
    .grand-total-val { font-size: 1.9rem; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .main-grid { grid-template-columns: 1fr; }
    .chart-panel { position: static; }
    .rp-col-nominal { display: none !important; }
  }
</style>
</head>
<body>
<noscript><p style="font-family:sans-serif;padding:40px;color:#333">JavaScript is required to run this dashboard.</p></noscript>
<div id="app">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:16px;font-family:'DM Sans',sans-serif;">
    <div style="width:32px;height:32px;border:3px solid rgba(0,0,0,0.1);border-top-color:#2a6e1e;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <div style="font-size:14px;color:#555550;">Loading dashboard…</div>
  </div>
</div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyCi-h2avvX-QTUX5zuKa4J3jaf7LQo_YG8",
  authDomain: "house-budget-aaef1.firebaseapp.com",
  projectId: "house-budget-aaef1",
  storageBucket: "house-budget-aaef1.firebasestorage.app",
  messagingSenderId: "116442046831",
  appId: "1:116442046831:web:a9d30c701614f885fbc89a"
};
let app, db;
try {
  app = firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
} catch(e) {
  console.error("Firebase init failed:", e);
  document.getElementById("app").innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#a02020;"><strong>Failed to connect to database.</strong><br><small>' + e.message + '</small></div>';
}

const DEFAULTS = {
  home:   { label:"Home",                icon:"🏠", color:"#2a6e1e", items:[{name:"Mortgage",amount:3800},{name:"Utilities",amount:400},{name:"Property Tax",amount:720},{name:"Home Insurance",amount:132.55}] },
  subs:   { label:"Subscriptions",       icon:"📺", color:"#1a6b8a", items:[{name:"Gym (GoodLife)",amount:152},{name:"IPTV",amount:30},{name:"Home Security",amount:68},{name:"Netflix",amount:24},{name:"Amazon",amount:29},{name:"CAA",amount:20},{name:"Lottery",amount:20},{name:"Fubo",amount:17}] },
  phone:  { label:"Internet & Phone",    icon:"📱", color:"#6b3fa0", items:[{name:"Rogers (Internet & Home)",amount:113},{name:"Telus (Cell Phones)",amount:135.60}] },
  food:   { label:"Food & Home Supplies",icon:"🛒", color:"#a06b00", items:[{name:"Booster Juice",amount:80},{name:"A&W / McDonald's",amount:150},{name:"Grocery",amount:650},{name:"Costco",amount:250},{name:"Home Supplies",amount:250}] },
  auto:   { label:"Auto",                icon:"🚗", color:"#a02020", items:[{name:"Auto Insurance",amount:384.61},{name:"Gas",amount:450},{name:"407 ETR",amount:150}] },
  kids:   { label:"Kids Activities",     icon:"👧", color:"#7a3080", items:[{name:"Swimming",amount:100},{name:"Soccer",amount:74}] },
  invest: { label:"Investment",          icon:"📈", color:"#1a5280", items:[{name:"RESP",amount:580},{name:"BTC",amount:200},{name:"TFSA (Manny)",amount:1000},{name:"TFSA (Rani)",amount:0}] },
  other:  { label:"Others",              icon:"📦", color:"#555550", items:[{name:"House Cleaning",amount:200},{name:"Presto",amount:100},{name:"Life Insurance",amount:270},{name:"Gym (GoodLife)",amount:76},{name:"Enercare",amount:64},{name:"Claude AI",amount:27}] }
};
const CATEGORY_ORDER = ["home","kids","subs","auto","food","phone","invest","other"];
const fmt = n => "$" + Number(n).toLocaleString("en-CA", {minimumFractionDigits:0, maximumFractionDigits:2});
const sanitize = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const secTotal = cat => cat.items.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
const grandTotal = data => Object.values(data).reduce((s,c) => s + secTotal(c), 0);
let data = JSON.parse(JSON.stringify(DEFAULTS));
let editMode = false, chart = null, saveTimer = null, collapsedSections = {};

async function loadData() {
  try { const snap = await db.collection("budget").doc("main").get(); if (snap.exists) data = snap.data(); } catch(e) {}
}
async function saveData() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => { try { await db.collection("budget").doc("main").set(data); showSaved(); } catch(e) {} }, 800);
}
function showSaved() {
  const el = document.querySelector(".save-indicator");
  if (!el) return;
  el.classList.add("visible"); setTimeout(() => el.classList.remove("visible"), 2000);
}

function render() {
  const total = grandTotal(data);
  const keys = CATEGORY_ORDER.filter(k => data[k]);
  const summaryDefs = [
    { label:"Home",          val: secTotal(data.home),   sub:"mortgage, tax, ins." },
    { label:"Food",          val: secTotal(data.food),   sub:"groceries + eats" },
    { label:"Auto",          val: secTotal(data.auto),   sub:"insurance, gas, 407" },
    { label:"Investments",   val: secTotal(data.invest), sub:"RESP + BTC" },
    { label:"Subscriptions", val: secTotal(data.subs),   sub:"streaming + memberships" },
    { label:"Others",        val: secTotal(data.other)+secTotal(data.phone)+secTotal(data.kids), sub:"phone, transit, etc." },
  ];
  document.getElementById("app").innerHTML = `
    <div class="header">
      <div><h1>Monthly Expenses</h1></div>
      <div>
        <div style="display:flex;align-items:baseline;justify-content:flex-end;gap:8px;">
          <div class="grand-total-val" id="grand-total">${fmt(total)}</div>
          <div style="font-size:13px;font-weight:600;color:#2a6e1e;letter-spacing:0.04em;">CAD</div>
        </div>
        <div class="grand-total-label">total / month</div>
      </div>
    </div>
    <div class="summary-grid">${summaryDefs.map(s=>`
      <div class="sum-card">
        <div class="sum-card-label">${s.label}</div>
        <div class="sum-card-val" id="sum-${s.label.toLowerCase().replace(/\s+/g,'-')}">${fmt(s.val)}</div>
        <div class="sum-card-sub">${s.sub}</div>
      </div>`).join("")}
    </div>
    <div class="toolbar">
      <span class="save-indicator">✓ Saved to cloud</span>
      <button class="edit-btn ${editMode?"active":""}" onclick="toggleEdit()">${editMode?"✓ Done":"✎ Edit"}</button>
    </div>
    <div class="main-grid">
      <div class="categories">${keys.map((key,i) => renderSection(key, i)).join("")}</div>
      <div class="chart-panel">
        <div class="chart-panel-label">Breakdown</div>
        <div class="donut-wrap"><canvas id="donutChart"></canvas></div>
        <div class="legend" id="legend"></div>
      </div>
    </div>`;
  buildChart();
}

function renderSection(key, animIdx) {
  const cat = data[key];
  const total = secTotal(cat);
  const gt = grandTotal(data);
  const pct = gt > 0 ? (total/gt*100).toFixed(1) : "0.0";
  const catMax = Math.max(...cat.items.map(i => parseFloat(i.amount)||0), 1);
  const collapsed = collapsedSections[key];
  return `
    <div class="section" id="sec-${key}" style="animation-delay:${animIdx*0.04}s">
      <div class="section-header ${collapsed?"collapsed":""}" onclick="toggleSection('${key}')">
        <div class="section-title-wrap">
          <div class="section-icon" style="background:${cat.color}18">${cat.icon}</div>
          <span class="section-name">${cat.label}</span>
        </div>
        <div class="section-right">
          <span style="font-size:11px;color:#888">${pct}%</span>
          <span class="section-total" id="sectotal-${key}" style="color:${cat.color}">${fmt(total)}</span>
          <span class="chevron ${collapsed?"collapsed":""}">▾</span>
        </div>
      </div>
      ${!collapsed ? `<div class="section-body">
        ${cat.items.map((item,idx) => `
          <div class="line-item">
            ${editMode
              ? `<div style="display:flex;align-items:center;gap:6px;flex:1">
                   <button class="remove-btn" onclick="removeItem('${key}',${idx})">×</button>
                   <input class="name-input" type="text" value="${item.name.replace(/"/g,'&quot;')}" oninput="updateName('${key}',${idx},this.value)">
                 </div>`
              : `<span class="line-name">${sanitize(item.name)}</span>`}
            <div class="line-right">
              <div class="line-bar-wrap"><div class="line-bar" style="width:${Math.max(4,(parseFloat(item.amount)||0)/catMax*100).toFixed(0)}%;background:${cat.color}"></div></div>
              ${editMode
                ? `<input class="amount-input" type="number" value="${item.amount}" oninput="updateAmount('${key}',${idx},this.value)" onfocus="this.select()">`
                : `<span class="line-amount">${fmt(item.amount)}</span>`}
            </div>
          </div>`).join("")}
        ${editMode ? `<button class="add-item-btn" onclick="addItem('${key}')">+ Add item</button>` : ""}
      </div>` : ""}
    </div>`;
}

function buildChart() {
  const keys = CATEGORY_ORDER.filter(k => data[k]);
  const values = keys.map(k => secTotal(data[k]));
  const colors = keys.map(k => data[k].color);
  const labels = keys.map(k => data[k].label);
  const total = grandTotal(data);
  const canvas = document.getElementById("donutChart");
  if (!canvas) return;
  if (chart) { try { chart.destroy(); } catch(e) {} chart = null; }
  chart = new Chart(canvas, {
    type: "doughnut",
    data: { labels, datasets: [{ data: values, backgroundColor: colors.map(c=>c+"cc"), borderColor: colors, borderWidth: 1.5, hoverOffset: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: "68%",
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.label}: ${fmt(ctx.raw)} (${total>0?(ctx.raw/total*100).toFixed(1):0}%)` },
        backgroundColor: "#fff", borderColor: "rgba(0,0,0,0.1)", borderWidth: 1, titleColor: "#0d0d0b", bodyColor: "#555550", padding: 10
      }}
    }
  });
  const legend = document.getElementById("legend");
  if (legend) legend.innerHTML = keys.map(k=>`
    <div class="legend-item">
      <div class="legend-left"><div class="legend-dot" style="background:${data[k].color}"></div><span class="legend-name">${data[k].label}</span></div>
      <span class="legend-val">${fmt(secTotal(data[k]))}</span>
    </div>`).join("");
}

let budgetEditUnlocked = false;
window.toggleEdit = () => {
  if (!editMode) {
    if (budgetEditUnlocked) { editMode = true; render(); }
    else {
      const pwd = prompt("Enter password to edit:");
      if (pwd === "ajax123") { budgetEditUnlocked = true; editMode = true; render(); }
      else if (pwd !== null) alert("Incorrect password");
    }
  } else { editMode = false; budgetEditUnlocked = false; render(); }
};
window.toggleSection = (key) => {
  collapsedSections[key] = !collapsedSections[key];
  const sec = document.getElementById(`sec-${key}`);
  if (sec) sec.outerHTML = renderSection(key, 0);
};
window.updateAmount = (key, idx, val) => {
  const parsed = parseFloat(val);
  if (val===''||val==='-') return;
  data[key].items[idx].amount = isNaN(parsed) ? 0 : parsed;
  refreshTotals(key); saveData();
};
window.updateName = (key, idx, val) => { data[key].items[idx].name = val; saveData(); };
window.addItem = (key) => { data[key].items.push({name:"New item",amount:0}); render(); saveData(); };
window.removeItem = (key, idx) => { data[key].items.splice(idx, 1); render(); saveData(); };
function refreshTotals(key) {
  const st = document.getElementById(`sectotal-${key}`);
  if (st) st.textContent = fmt(secTotal(data[key]));
  const gt = document.getElementById("grand-total");
  if (gt) gt.textContent = fmt(grandTotal(data));
  const othersTotal = secTotal(data.other)+secTotal(data.phone)+secTotal(data.kids);
  document.querySelectorAll("[id^='sum-']").forEach(el => {
    if (el.id==="sum-home")          el.textContent = fmt(secTotal(data.home));
    if (el.id==="sum-food")          el.textContent = fmt(secTotal(data.food));
    if (el.id==="sum-auto")          el.textContent = fmt(secTotal(data.auto));
    if (el.id==="sum-investments")   el.textContent = fmt(secTotal(data.invest));
    if (el.id==="sum-subscriptions") el.textContent = fmt(secTotal(data.subs));
    if (el.id==="sum-others")        el.textContent = fmt(othersTotal);
  });
  buildChart();
}

window.addEventListener('DOMContentLoaded', async function() {
  // Render immediately with defaults so page isn't blank
  try { render(); } catch(e) {
    console.error("Initial render failed:", e);
    document.getElementById("app").innerHTML = '<div style="padding:40px;font-family:sans-serif;color:#a02020;"><strong>Render error:</strong><br><small>' + e.message + '</small></div>';
  }

  // Load all data in parallel then re-render everything
  try {
    await Promise.all([loadData(), loadFsData(), loadRpData(), loadWfData()]);
    try { render(); } catch(e) { console.error("Post-load render failed:", e); }
    try { injectSections(); } catch(e) { console.error("injectSections failed:", e); }
  } catch(e) {
    console.warn("Data load failed, using defaults:", e);
    // Still inject sections with default data
    try { injectSections(); } catch(e2) {}
  }
});

// ============================================================
// HELPERS & SHARED STATE
// ============================================================
let siteEditUnlocked = false;
function requireEditPassword(cb) {
  if (siteEditUnlocked) { cb(); return; }
  const pwd = prompt("Enter password to edit:");
  if (pwd === "ajax123") { siteEditUnlocked = true; cb(); }
  else if (pwd !== null) alert("Incorrect password");
}

let rpNeedsRefresh = false;
function refreshRetirementIfVisible() {
  const c = document.getElementById("rp-container");
  if (c) renderRpSection(); else rpNeedsRefresh = true;
}

function getRpBalances() {
  const ret    = fsData.investments.retirement.items;
  const others = fsData.investments.others.items;
  const getAmt = (items, names) => {
    const it = items.find(i => names.some(n => i.name.toUpperCase().includes(n.toUpperCase())));
    return (it && it.amount !== undefined) ? parseFloat(it.amount) : null;
  };
  return {
    rrsp:  ret.filter(i => i.name.toUpperCase().includes('RRSP') || i.name.toUpperCase().includes('RSP')).reduce((s,i)=>s+(parseFloat(i.amount)||0),0),
    tfsa:  ret.filter(i => i.name.toUpperCase().includes('TFSA')).reduce((s,i)=>s+(parseFloat(i.amount)||0),0),
    rpp:   getAmt(ret, ['RPP']),
    btc:   getAmt(ret, ['BTC']),
    india: getAmt(others, ['India']),
    wood:  fsData.real_estate && fsData.real_estate.woodstock ? parseFloat(fsData.real_estate.woodstock.value)||0 : null,
    resp:  fsData.investments.kids && fsData.investments.kids.items[0] ? parseFloat(fsData.investments.kids.items[0].amount)||0 : null,
  };
}

// ============================================================
// TFSA SEQUENCING — single source of truth used by both
// Retirement Plan and Wedding Fund sections.
// TFSA grows at 5%, funds Noor's wedding (2048) first,
// then Veer's (2050), remainder rolls into retirement (2051).
// ============================================================
function calcTfsaSequence() {
  const tfsaNow = getTfsaBalance();
  const r = 0.05, inf = 0.025, baseYear = 2026, retYear = 2051;
  // Monthly TFSA contribution — combined from both budget lines (Manny + Rani)
  const tfsaMo = getTfsaMonthlyContrib();
  // FV with monthly contributions: PV grows + monthly contrib accumulates
  const fvTfsa = (pv, mo, years) => {
    const rm = r/12, nm = years*12;
    return pv*Math.pow(1+rm,nm) + mo*(Math.pow(1+rm,nm)-1)/rm;
  };
  const noorYear = new Date(wfData.noor.born).getFullYear() + wfData.noor.weddingAge;
  const veerYear = new Date(wfData.veer.born).getFullYear() + wfData.veer.weddingAge;
  const noorGoal = wfData.noor.goalToday * Math.pow(1+inf, noorYear - baseYear);
  const veerGoal = wfData.veer.goalToday * Math.pow(1+inf, veerYear - baseYear);
  // Step 1: grow to Noor's wedding with monthly contributions, pay her share
  const tfsaAtNoor  = fvTfsa(tfsaNow, tfsaMo, noorYear - baseYear);
  const noorSurplus = tfsaAtNoor - noorGoal;
  const afterNoor   = Math.max(0, noorSurplus);
  // Step 2: remainder grows to Veer's wedding (contributions continue), pay his share
  const tfsaAtVeer  = fvTfsa(afterNoor, tfsaMo, veerYear - noorYear);
  const veerSurplus = tfsaAtVeer - veerGoal;
  const afterVeer   = Math.max(0, veerSurplus);
  // Step 3: remainder + contributions grow to retirement
  const tfsaAtRetirement = fvTfsa(afterVeer, tfsaMo, retYear - veerYear);
  return { tfsaNow, tfsaMo, noorYear, veerYear, retYear,
           noorGoal, veerGoal,
           tfsaAtNoor, noorSurplus, afterNoor,
           tfsaAtVeer, veerSurplus, afterVeer,
           tfsaAtRetirement };
}

};
window.updateFsRe = (key, field, val) => {
  const p=parseFloat(val); if(val===''||val==='-')return;

  saveFsData(); renderFsSection(); refreshRetirementIfVisible();

window.updateFsLib = (idx, field, val) => {

let rpEditMode = false;
function renderRpSection() {
  const container = document.getElementById("rp-container");
  if (!container) return;
  rpNeedsRefresh = false;
  const inf=0.025, r=0.05, re=0.025, btcR=0.05, yrs=25;
  const defl=Math.pow(1+inf,yrs);
  const fv=(pv,cMo,rate,n)=>{const r=rate/12,nm=n*12;return pv*Math.pow(1+r,nm)+cMo*(Math.pow(1+r,nm)-1)/r;}; // monthly compounding
  const fmt=n=>"$"+Math.round(n).toLocaleString("en-CA");
  const fmtM=n=>fmt(n)+"/mo";
  const contrib=window.rpContrib||{rrsp:1250,rpp:500,resp:580}; // tfsa contrib comes from budget section via getTfsaMonthlyContrib()
  window.rpContrib=contrib;
  const bal=getRpBalances();
  const rrspNow=(bal.rrsp>0)?bal.rrsp:70252;
  const tfsaNow=(bal.tfsa>0)?bal.tfsa:6735;
  const rppNow=(bal.rpp!=null)?bal.rpp:25979;
  const btcNow=(bal.btc!=null)?bal.btc:12000;
  const indiaNow=(bal.india!=null)?bal.india:300000;
  const woodNow=(bal.wood!=null)?bal.wood:216667;
  const respNow=(bal.resp!=null)?bal.resp:39837;
  const rrsp65=fv(rrspNow,contrib.rrsp,r,yrs);
  // TFSA: grows sequentially — funds Noor (2048) then Veer (2050), remainder to retirement
  const tfsaSeq=calcTfsaSequence();

async function loadWfData() {
  try {

    if (snap.exists) {
      const d = snap.data();
      if (d.noor) wfData.noor = {...WF_DEFAULTS.noor, ...d.noor};

async function saveWfData() {
  clearTimeout(wfSaveTimer);

      detail: "Life insurance covers death but not extended inability to work. With $13K+/mo in obligations, check whether employer group disability coverage is sufficient for both you and Rani.",
      tag: "Insurance · Review"
    },
    {
      priority: "low",
      icon: "📈",
      title: "Prioritize TFSA over RRSP as retirement approaches",
      detail: "RRSP/RPP carry a ~25% tax haircut at withdrawal. As TFSA contribution room opens each year, consider shifting new savings there. Every $1 in TFSA is worth ~$1.33 vs RRSP in after-tax terms.",
      tag: "Tax Planning · Long-term"
    },
  ];

  const priorityColors = {
    high:   { bg:"#fff8f8", border:"rgba(160,32,32,0.15)",  tag:"#a02020", dot:"#a02020", label:"High Priority" },
    medium: { bg:"#fff8f0", border:"rgba(160,96,0,0.15)",   tag:"#a06000", dot:"#e08000", label:"Medium Priority" },
    low:    { bg:"#f8f9ff", border:"rgba(26,82,128,0.12)",  tag:"#1a5280", dot:"#4a82b0", label:"Low Priority"  },
  };

  const grouped = ["high","medium","low"].map(p => {
    const group = actions.filter(a => a.priority === p);
    if (!group.length) return '';
    const c = priorityColors[p];
    return `
      <div style="border-bottom:1px solid rgba(0,0,0,0.08);">
        <div style="padding:10px 16px;background:#fafaf8;border-bottom:0.5px solid rgba(0,0,0,0.06);">
          <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:${c.tag};">● ${c.label}</span>
        </div>
        ${group.map((a,i) => `
        <div style="padding:12px 16px;border-bottom:0.5px solid rgba(0,0,0,0.05);background:${i%2===0?'#fff':'#fafaf8'};" onmouseover="this.style.background='#f4f4f0'" onmouseout="this.style.background='${i%2===0?'#fff':'#fafaf8'}'">
          <div style="display:flex;align-items:flex-start;gap:10px;">
            <span style="font-size:18px;flex-shrink:0;margin-top:1px;">${a.icon}</span>
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
                <span style="font-size:13px;font-weight:600;color:#0d0d0b;">${a.title}</span>
                <span style="font-size:10px;font-weight:600;color:${c.tag};background:${c.bg};border:1px solid ${c.border};padding:2px 8px;border-radius:20px;white-space:nowrap;">${a.tag}</span>
              </div>
              <div style="font-size:12px;color:#555;line-height:1.6;">${a.detail}</div>
            </div>
          </div>
        </div>`).join('')}
      </div>`;
  }).join('');

  container.innerHTML = `
    <div style="padding:12px 16px;border-bottom:1px solid rgba(0,0,0,0.08);background:#fafaf8;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <span style="font-size:11px;color:#aaa;">${actions.filter(a=>a.priority==='high').length} high priority · ${actions.filter(a=>a.priority==='medium').length} medium · ${actions.filter(a=>a.priority==='low').length} low</span>
      <span style="font-size:11px;color:#aaa;">Review periodically — update as items are resolved</span>
    </div>
    ${grouped}
    <div style="padding:12px 16px;background:#fafaf8;border-top:1px solid rgba(0,0,0,0.08);">
      <div style="font-size:11px;color:#aaa;">Based on financial snapshot as of 2026. Not financial advice — consult a licensed advisor for personalized guidance.</div>
    </div>`;
}
</script>
</body>
</html>
