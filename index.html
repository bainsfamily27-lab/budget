<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    background: #eceae4;
    color: #0d0d0b;
    min-height: 100vh;
    padding: 24px 20px;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Loading */
  .loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 60vh; gap: 16px;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid rgba(0,0,0,0.1);
    border-top-color: #2a6e1e; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { font-size: 14px; color: #555550; }

  /* Header */
  .header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 24px; border-bottom: 1px solid rgba(0,0,0,0.12); padding-bottom: 20px;
    animation: fadeUp 0.4s ease both;
  }
  .header h1 {
    font-family: 'DM Serif Display', serif; font-size: 2rem;
    font-weight: 400; color: #0d0d0b; letter-spacing: -0.02em; line-height: 1;
  }
  .header p { font-size: 12px; color: #555550; margin-top: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
  .grand-total-val { font-family: 'DM Serif Display', serif; font-size: 2.4rem; color: #2a6e1e; line-height: 1; text-align: right; }
  .grand-total-label { font-size: 11px; color: #555550; letter-spacing: 0.07em; text-transform: uppercase; margin-top: 4px; text-align: right; }

  /* Summary cards */
  .summary-grid {
    display: grid; grid-template-columns: repeat(6, minmax(0,1fr));
    gap: 10px; margin-bottom: 20px; animation: fadeUp 0.4s 0.05s ease both;
  }
  .sum-card {
    background: #fff; border: 1px solid rgba(0,0,0,0.13); border-radius: 10px; padding: 12px 14px;
  }
  .sum-card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: #333330; margin-bottom: 6px; }
  .sum-card-val { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: #0d0d0b; line-height: 1; }
  .sum-card-sub { font-size: 11px; color: #888; margin-top: 4px; }

  /* Toolbar */
  .toolbar {
    display: flex; justify-content: flex-end; align-items: center;
    gap: 12px; margin-bottom: 14px;
  }
  .save-indicator { font-size: 12px; color: #2a6e1e; opacity: 0; transition: opacity 0.3s; }
  .save-indicator.visible { opacity: 1; }
  .edit-btn {
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    padding: 6px 16px; border-radius: 20px; cursor: pointer;
    letter-spacing: 0.04em; transition: background 0.2s, color 0.2s;
    border: 1px solid rgba(0,0,0,0.15); background: rgba(0,0,0,0.05); color: #333330;
  }
  .edit-btn.active {
    background: rgba(42,110,30,0.1); border-color: rgba(42,110,30,0.35); color: #2a6e1e;
  }

  /* Main layout */
  .main-grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }

  /* Sections */
  .categories { display: flex; flex-direction: column; gap: 14px; }
  .section {
    background: #fff; border: 1px solid rgba(0,0,0,0.13); border-radius: 12px;
    overflow: hidden; animation: fadeUp 0.35s ease both;
  }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; min-height: 44px; border-bottom: 1px solid rgba(0,0,0,0.08);
    cursor: pointer; user-select: none; transition: background 0.15s; -webkit-tap-highlight-color: rgba(0,0,0,0.05);
  }
  .section-header:hover { background: #fafaf8; }
  .section-header.collapsed { border-bottom: none; }
  .section-title-wrap { display: flex; align-items: center; gap: 10px; }
  .section-icon {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 15px;
  }
  .section-name { font-size: 13px; font-weight: 600; color: #0d0d0b; }
  .section-right { display: flex; align-items: center; gap: 12px; }
  .section-total { font-family: 'DM Serif Display', serif; font-size: 1.05rem; font-weight: 400; }
  .chevron { color: #888; font-size: 11px; transition: transform 0.2s; }
  .chevron.collapsed { transform: rotate(-90deg); }

  /* Line items */
  .section-body { padding: 4px 0; }
  .line-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 7px 16px; transition: background 0.1s;
  }
  .line-item:hover { background: #f8f7f4; }
  .line-name { font-size: 13px; color: #0d0d0b; font-weight: 450; }
  .line-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 12px; }
  .line-bar-wrap { width: 72px; height: 3px; background: rgba(0,0,0,0.07); border-radius: 2px; }
  .line-bar { height: 100%; border-radius: 2px; opacity: 0.55; }
  .line-amount { font-size: 13px; font-weight: 600; color: #0d0d0b; font-variant-numeric: tabular-nums; min-width: 72px; text-align: right; }

  /* Inputs */
  .name-input, .amount-input {
    background: transparent; border: none; border-bottom: 1px solid rgba(0,0,0,0.15);
    font-family: 'DM Sans', sans-serif; color: #0d0d0b; outline: none; padding: 1px 0;
    font-size: 16px; /* prevent iOS zoom on focus */
  }
  .name-input { font-size: 13px; flex: 1; min-width: 0; }
  .amount-input { font-size: 13px; font-weight: 600; width: 80px; text-align: right; }
  .name-input:focus, .amount-input:focus { border-bottom-color: #2a6e1e; }
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Remove + Add buttons */
  .remove-btn {
    background: none; border: none; cursor: pointer; color: #cc3333;
    font-size: 16px; padding: 0 4px 0 0; line-height: 1; flex-shrink: 0;
  }
  .add-item-btn {
    width: calc(100% - 32px); margin: 6px 16px 10px;
    background: none; border: 1px dashed rgba(0,0,0,0.2); border-radius: 6px;
    font-size: 12px; color: #555550; cursor: pointer; padding: 5px 12px;
    text-align: left; font-family: 'DM Sans', sans-serif;
  }
  .add-item-btn:hover { border-color: rgba(0,0,0,0.35); color: #0d0d0b; }

  /* Chart panel */
  .chart-panel {
    background: #fff; border: 1px solid rgba(0,0,0,0.13); border-radius: 12px;
    padding: 20px; position: sticky; top: 16px; align-self: start;
    animation: fadeUp 0.4s 0.1s ease both;
  }
  .chart-panel-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #555550; margin-bottom: 16px; }
  .donut-wrap { position: relative; height: 200px; margin-bottom: 16px; }
  .legend { display: flex; flex-direction: column; gap: 7px; }
  .legend-item { display: flex; align-items: center; justify-content: space-between; font-size: 12px; }
  .legend-left { display: flex; align-items: center; gap: 7px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .legend-name { color: #555550; }
  .legend-val { font-weight: 600; color: #0d0d0b; font-variant-numeric: tabular-nums; }

  /* ── MOBILE SPECIFIC ────────────────────────────────── */
  /* Tab buttons on mobile */
  @media (max-width: 480px) {
    body { padding: 12px 10px; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .sum-card { padding: 10px 12px; }
    .sum-card-val { font-size: 1rem; }

    /* Private panel tab buttons */
    #private-container button[onclick*="switchPrivateTab"] {
      font-size: 11px !important;
      padding: 10px 10px !important;
    }

    /* Retirement expenses table — stack note below category */
    .ret-exp-note { display: none; }

    /* RESP table */
    .rp-col-nominal { display: none !important; }

    /* Portfolio table — 3 cols instead of 5 */
    .rp-portfolio-row {
      grid-template-columns: 2fr 1fr 1fr !important;
    }
    .rp-col-growth { display: none !important; }
  }

    /* ── RESPONSIVE / MOBILE ─────────────────────────────── */
  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
    .summary-grid { grid-template-columns: repeat(3, 1fr); }
    .chart-panel { position: static; }
  }

  @media (max-width: 600px) {
    body { padding: 14px 12px; }
    .header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .header h1 { font-size: 1.6rem; }
    .grand-total-val { font-size: 1.9rem; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .main-grid { grid-template-columns: 1fr; }
    .chart-panel { position: static; }
    .fs-cols { grid-template-columns: 1fr !important; }
    .fs-cols > div:first-child { border-right: none !important; border-bottom: 1px solid rgba(0,0,0,0.08); }

    /* Private panel tabs */
    #private-container [style*="grid-template-columns:2fr 1fr 1fr 1fr 1fr"] {
      grid-template-columns: 2fr 1fr 1fr !important;
    }
    /* Hide nominal column on mobile — keep today's $ */
    .rp-col-nominal { display: none !important; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// Firebase loaded via CDN scripts in <head>

const firebaseConfig = {
  apiKey: "AIzaSyCi-h2avvX-QTUX5zuKa4J3jaf7LQo_YG8",
  authDomain: "house-budget-aaef1.firebaseapp.com",
  projectId: "house-budget-aaef1",
  storageBucket: "house-budget-aaef1.firebasestorage.app",
  messagingSenderId: "116442046831",
  appId: "1:116442046831:web:a9d30c701614f885fbc89a"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const DEFAULTS = {
  home:   { label:"Home",                icon:"🏠", color:"#2a6e1e", items:[{name:"Mortgage",amount:3800},{name:"Utilities",amount:400},{name:"Property Tax",amount:720},{name:"Home Insurance",amount:132.55}] },
  subs:   { label:"Subscriptions",       icon:"📺", color:"#1a6b8a", items:[{name:"Gym (GoodLife)",amount:152},{name:"IPTV",amount:30},{name:"Home Security",amount:68},{name:"Netflix",amount:24},{name:"Amazon",amount:29},{name:"CAA",amount:20},{name:"Lottery",amount:20},{name:"Fubo",amount:17}] },
  phone:  { label:"Internet & Phone",    icon:"📱", color:"#6b3fa0", items:[{name:"Rogers (Internet & Home)",amount:113},{name:"Telus (Cell Phones)",amount:135.60}] },
  food:   { label:"Food & Home Supplies",icon:"🛒", color:"#a06b00", items:[{name:"Booster Juice",amount:80},{name:"A&W / McDonald's",amount:150},{name:"Grocery",amount:650},{name:"Costco",amount:250},{name:"Home Supplies",amount:250}] },
  auto:   { label:"Auto",                icon:"🚗", color:"#a02020", items:[{name:"Auto Insurance",amount:384.61},{name:"Gas",amount:450},{name:"407 ETR",amount:150}] },
  kids:   { label:"Kids Activities",     icon:"👧", color:"#7a3080", items:[{name:"Swimming",amount:100},{name:"Soccer",amount:74}] },
  invest: { label:"Investment",          icon:"📈", color:"#1a5280", items:[{name:"RESP",amount:580},{name:"BTC",amount:200}] },
  other:  { label:"Others",              icon:"📦", color:"#555550", items:[{name:"House Cleaning",amount:200},{name:"Presto",amount:100},{name:"Life Insurance",amount:270},{name:"Gym (GoodLife)",amount:76},{name:"Enercare",amount:64},{name:"Claude AI",amount:27}] }
};

// ✏️ CHANGE CATEGORY ORDER HERE — just rearrange the keys in this array
const CATEGORY_ORDER = ["home", "kids", "subs", "auto", "food", "phone", "invest", "other"];

const fmt = n => "$" + Number(n).toLocaleString("en-CA", {minimumFractionDigits:0, maximumFractionDigits:2});
const secTotal = cat => cat.items.reduce((s,i) => s + (parseFloat(i.amount)||0), 0);
const grandTotal = data => Object.values(data).reduce((s,c) => s + secTotal(c), 0);

let data = JSON.parse(JSON.stringify(DEFAULTS));
let editMode = false;
let chart = null;
let saveTimer = null;
let collapsedSections = {};

// --- Firebase ---
async function loadData() {
  try {
    const snap = await db.collection("budget").doc("main").get();
    if (snap.exists) data = snap.data();
  } catch(e) { console.log("Using defaults", e); }
}

async function saveData() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try {
      await db.collection("budget").doc("main").set(data);
      showSaved();
    } catch(e) { console.error("Save failed", e); }
  }, 800);
}

function showSaved() {
  const el = document.querySelector(".save-indicator");
  if (!el) return;
  el.classList.add("visible");
  setTimeout(() => el.classList.remove("visible"), 2000);
}

// --- Render ---
function render() {
  const total = grandTotal(data);
  const keys = CATEGORY_ORDER.filter(k => data[k]);

  const summaryDefs = [
    { label:"Home",          val: secTotal(data.home),   sub:"mortgage, tax, ins." },
    { label:"Food",          val: secTotal(data.food),   sub:"groceries + eats" },
    { label:"Auto",          val: secTotal(data.auto),   sub:"insurance, gas, 407" },
    { label:"Investments",   val: secTotal(data.invest), sub:"RESP + BTC" },
    { label:"Subscriptions", val: secTotal(data.subs),   sub:"streaming + memberships" },
    { label:"Others",        val: secTotal(data.other)+secTotal(data.phone)+secTotal(data.kids), sub:"phone, transit, etc." },
  ];

  document.getElementById("app").innerHTML = `
    <div class="header">
      <div>
        <h1>Monthly Expenses</h1>
      </div>
      <div>
        <div style="display:flex;align-items:baseline;justify-content:flex-end;gap:8px;">
          <div class="grand-total-val" id="grand-total">${fmt(total)}</div>
          <div style="font-size:13px;font-weight:600;color:#2a6e1e;letter-spacing:0.04em;">CAD</div>
        </div>
        <div class="grand-total-label">total / month</div>
        <div id="usd-equiv" style="font-size:12px;color:#888;text-align:right;margin-top:3px;">fetching USD...</div>
      </div>
    </div>

    <div class="summary-grid" id="summary-grid">
      ${summaryDefs.map(s => `
        <div class="sum-card">
          <div class="sum-card-label">${s.label}</div>
          <div class="sum-card-val" id="sum-${s.label.toLowerCase().replace(/\s+/g,'-')}">${fmt(s.val)}</div>
          <div class="sum-card-sub">${s.sub}</div>
        </div>
      `).join("")}
    </div>

    <div class="toolbar">
      <span class="save-indicator">✓ Saved to cloud</span>
      <button class="edit-btn ${editMode?"active":""}" onclick="toggleEdit()">${editMode ? "✓ Done" : "✎ Edit"}</button>
    </div>

    <div class="main-grid">
      <div class="categories" id="categories">
        ${keys.map((key,i) => renderSection(key, i)).join("")}
      </div>
      <div class="chart-panel">
        <div class="chart-panel-label">Breakdown</div>
        <div class="donut-wrap"><canvas id="donutChart"></canvas></div>
        <div class="legend" id="legend"></div>
      </div>
    </div>
  `;

  buildChart();
}

function renderSection(key, animIdx) {
  const cat = data[key];
  const total = secTotal(cat);
  const gt = grandTotal(data);
  const pct = gt > 0 ? (total/gt*100).toFixed(1) : "0.0";
  const catMax = Math.max(...cat.items.map(i => parseFloat(i.amount)||0), 1);
  const collapsed = collapsedSections[key];

  return `
    <div class="section" id="sec-${key}" style="animation-delay:${animIdx*0.04}s">
      <div class="section-header ${collapsed?"collapsed":""}" onclick="toggleSection('${key}')">
        <div class="section-title-wrap">
          <div class="section-icon" style="background:${cat.color}18">${cat.icon}</div>
          <span class="section-name">${cat.label}</span>
        </div>
        <div class="section-right">
          <span style="font-size:11px;color:#888">${pct}%</span>
          <span class="section-total" id="sectotal-${key}" style="color:${cat.color}">${fmt(total)}</span>
          <span class="chevron ${collapsed?"collapsed":""}">▾</span>
        </div>
      </div>
      ${!collapsed ? `
      <div class="section-body">
        ${cat.items.map((item,idx) => `
          <div class="line-item">
            ${editMode
              ? `<div style="display:flex;align-items:center;gap:6px;flex:1">
                   <button class="remove-btn" onclick="removeItem('${key}',${idx})">×</button>
                   <input class="name-input" type="text" value="${item.name.replace(/"/g,'&quot;')}"
                     onchange="updateName('${key}',${idx},this.value)">
                 </div>`
              : `<span class="line-name">${item.name}</span>`
            }
            <div class="line-right">
              <div class="line-bar-wrap">
                <div class="line-bar" style="width:${Math.max(4,(parseFloat(item.amount)||0)/catMax*100).toFixed(0)}%;background:${cat.color}"></div>
              </div>
              ${editMode
                ? `<input class="amount-input" type="number" value="${item.amount}"
                     onchange="updateAmount('${key}',${idx},this.value)"
                     onfocus="this.select()">`
                : `<span class="line-amount">${fmt(item.amount)}</span>`
              }
            </div>
          </div>
        `).join("")}
        ${editMode ? `<button class="add-item-btn" onclick="addItem('${key}')">+ Add item</button>` : ""}
      </div>` : ""}
    </div>
  `;
}

function buildChart() {
  const keys = CATEGORY_ORDER.filter(k => data[k]);
  const values = keys.map(k => secTotal(data[k]));
  const colors = keys.map(k => data[k].color);
  const labels = keys.map(k => data[k].label);
  const total = grandTotal(data);

  const canvas = document.getElementById("donutChart");
  if (!canvas) return;

  if (chart) { chart.destroy(); chart = null; }

  chart = new Chart(canvas, {
    type: "doughnut",
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: colors.map(c=>c+"cc"), borderColor: colors, borderWidth: 1.5, hoverOffset: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: "68%",
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: { label: ctx => ` ${ctx.label}: ${fmt(ctx.raw)} (${total>0?(ctx.raw/total*100).toFixed(1):0}%)` },
          backgroundColor: "#fff", borderColor: "rgba(0,0,0,0.1)", borderWidth: 1,
          titleColor: "#0d0d0b", bodyColor: "#555550", padding: 10
        }
      }
    }
  });

  const legend = document.getElementById("legend");
  if (legend) {
    legend.innerHTML = keys.map(k => `
      <div class="legend-item">
        <div class="legend-left">
          <div class="legend-dot" style="background:${data[k].color}"></div>
          <span class="legend-name">${data[k].label}</span>
        </div>
        <span class="legend-val">${fmt(secTotal(data[k]))}</span>
      </div>
    `).join("");
  }
}

// --- Actions ---
let budgetEditUnlocked = false;
window.toggleEdit = () => {
  if (!editMode) {
    if (budgetEditUnlocked) { editMode = true; render(); }
    else {
      const pwd = prompt("Enter password to edit:");
      if (pwd === "ajax123") { budgetEditUnlocked = true; editMode = true; render(); }
      else if (pwd !== null) alert("Incorrect password");
    }
  } else { editMode = false; budgetEditUnlocked = false; render(); }
};

window.toggleSection = (key) => {
  collapsedSections[key] = !collapsedSections[key];
  const sec = document.getElementById(`sec-${key}`);
  if (sec) sec.outerHTML = renderSection(key, 0);
};

window.updateAmount = (key, idx, val) => {
  data[key].items[idx].amount = parseFloat(val) || 0;
  refreshTotals(key);
  saveData();
};

window.updateName = (key, idx, val) => {
  data[key].items[idx].name = val.trim() || data[key].items[idx].name;
  saveData();
};

window.addItem = (key) => {
  data[key].items.push({ name: "New item", amount: 0 });
  render();
  saveData();
};

window.removeItem = (key, idx) => {
  data[key].items.splice(idx, 1);
  render();
  saveData();
};

function refreshTotals(key) {
  // Update section total
  const st = document.getElementById(`sectotal-${key}`);
  if (st) st.textContent = fmt(secTotal(data[key]));

  // Update grand total
  const gt = document.getElementById("grand-total");
  if (gt) gt.textContent = fmt(grandTotal(data));

  // Update summary cards
  const summaryMap = {
    home: "home", food: "food", auto: "auto",
    invest: "investments", subs: "subscriptions",
    other: "others", phone: "others", kids: "others"
  };
  const othersTotal = secTotal(data.other)+secTotal(data.phone)+secTotal(data.kids);
  document.querySelectorAll("[id^='sum-']").forEach(el => {
    if (el.id === "sum-home")          el.textContent = fmt(secTotal(data.home));
    if (el.id === "sum-food")          el.textContent = fmt(secTotal(data.food));
    if (el.id === "sum-auto")          el.textContent = fmt(secTotal(data.auto));
    if (el.id === "sum-investments")   el.textContent = fmt(secTotal(data.invest));
    if (el.id === "sum-subscriptions") el.textContent = fmt(secTotal(data.subs));
    if (el.id === "sum-others")        el.textContent = fmt(othersTotal);
  });

  // Rebuild chart
  buildChart();
  updateUSD();
}



// --- Init ---
// Render immediately on page load
window.addEventListener('DOMContentLoaded', function() {
  try { render(); } catch(e) { console.error("render failed:", e); }
  setTimeout(function() {
    try { injectSections(); } catch(e) { console.error("injectSections failed:", e); }
  }, 200);

  // Load Firebase data in background, then re-render and re-inject
  try {
    loadData().then(function() {
      try { render(); } catch(e) {}
      setTimeout(function() { try { injectSections(); } catch(e) {} }, 100);
    }).catch(function(e) { console.warn("Firebase:", e); });
  } catch(e) { console.warn("Firebase init failed:", e); }
});


// ============================================================
// HELPERS & SHARED STATE
// ============================================================
let siteEditUnlocked = false;
function requireEditPassword(cb) {
  if (siteEditUnlocked) { cb(); return; }
  const pwd = prompt("Enter password to edit:");
  if (pwd === "ajax123") { siteEditUnlocked = true; cb(); }
  else if (pwd !== null) alert("Incorrect password");
}

let rpNeedsRefresh = false;
function refreshRetirementIfVisible() {
  const c = document.getElementById("rp-container");
  if (c) renderRpSection(); else rpNeedsRefresh = true;
}

function getRpBalances() {
  const ret    = fsData.investments.retirement.items;
  const others = fsData.investments.others.items;
  const getAmt = (items, names) => {
    const it = items.find(i => names.some(n => i.name.toUpperCase().includes(n.toUpperCase())));
    return (it && it.amount !== undefined) ? parseFloat(it.amount) : null;
  };
  return {
    rrsp:  getAmt(ret,    ['RRSP','RSP']),
    tfsa:  getAmt(ret,    ['TFSA']),
    rpp:   getAmt(ret,    ['RPP']),
    btc:   getAmt(ret,    ['BTC']),
    india: getAmt(others, ['India']),
    wood:  fsData.real_estate && fsData.real_estate.woodstock ? parseFloat(fsData.real_estate.woodstock.value)||0 : null,
    resp:  fsData.investments.kids && fsData.investments.kids.items[0] ? parseFloat(fsData.investments.kids.items[0].amount)||0 : null,
  };
}

const fsFmt      = n => "$" + Number(n).toLocaleString("en-CA",{minimumFractionDigits:0,maximumFractionDigits:0});
const fsInvTotal = () => Object.values(fsData.investments).reduce((s,c)=>s+c.items.reduce((ss,i)=>ss+(parseFloat(i.amount)||0),0),0);
const fsLibTotal = () => Object.values(fsData.liabilities).reduce((s,c)=>s+c.items.reduce((ss,i)=>ss+(parseFloat(i.amount)||0),0),0);
const fsPrimaryEquity   = () => fsData.real_estate.primary.value   - fsData.real_estate.primary.mortgage;
const fsWoodstockEquity = () => fsData.real_estate.woodstock.value - fsData.real_estate.woodstock.mortgage;
const fsNwWith    = () => fsInvTotal() + fsPrimaryEquity() + fsWoodstockEquity() - fsLibTotal();
const fsNwWithout = () => fsInvTotal() + fsWoodstockEquity() - fsData.liabilities.mortgages.items[1].amount;

async function loadFsData() {
  try {
    const snap = await db.collection("budget").doc("financialsummary").get();
    if (snap.exists) {
      const d = snap.data();
      if (d.investments) fsData.investments = d.investments;
      if (d.real_estate)  fsData.real_estate  = d.real_estate;
      if (d.liabilities)  fsData.liabilities  = d.liabilities;
    }
  } catch(e) { console.warn("loadFsData failed", e); }
}

async function saveFsData() {
  clearTimeout(fsSaveTimer);
  fsSaveTimer = setTimeout(async () => {
    try {
      await db.collection("budget").doc("financialsummary").set(fsData);
      const el = document.getElementById("fs-saved");
      if (el) { el.style.opacity=1; setTimeout(()=>{el.style.opacity=0;},2000); }
    } catch(e) {}
  }, 800);
}

let rpSaveTimer = null;
async function loadRpData() {
  try {
    const snap = await db.collection("budget").doc("retirementplan").get();
    if (snap.exists) {
      const d = snap.data();
      if (d.contrib)     window.rpContrib   = d.contrib;
      if (d.retExpenses) window.retExpenses = d.retExpenses;
    }
  } catch(e) { console.warn("loadRpData failed", e); }
}
async function saveRpData() {
  clearTimeout(rpSaveTimer);
  rpSaveTimer = setTimeout(async () => {
    try {
      await db.collection("budget").doc("retirementplan").set({
        contrib: window.rpContrib||{}, retExpenses: window.retExpenses||[]
      });
      const el = document.getElementById("rp-saved");
      if (el) { el.style.opacity=1; setTimeout(()=>{el.style.opacity=0;},2000); }
    } catch(e) {}
  }, 800);
}

window.updateFsInv = (catKey, idx, field, val) => {
  if (field==="amount") fsData.investments[catKey].items[idx].amount = parseFloat(val)||0;
  else fsData.investments[catKey].items[idx].name = val.trim()||fsData.investments[catKey].items[idx].name;
  saveFsData(); renderFsSection(); refreshRetirementIfVisible();
};
window.updateFsRe = (key, field, val) => {
  fsData.real_estate[key][field] = parseFloat(val)||0;
  saveFsData(); renderFsSection(); refreshRetirementIfVisible();
};
window.updateFsLib = (idx, field, val) => {
  if (field==="amount") {
    fsData.liabilities.mortgages.items[idx].amount = parseFloat(val)||0;
    if (idx===0) fsData.real_estate.primary.mortgage   = parseFloat(val)||0;
    if (idx===1) fsData.real_estate.woodstock.mortgage = parseFloat(val)||0;
  } else {
    fsData.liabilities.mortgages.items[idx].name = val.trim()||fsData.liabilities.mortgages.items[idx].name;
  }
  saveFsData(); renderFsSection(); refreshRetirementIfVisible();
};
window.addFsInvItem = (catKey) => {
  fsData.investments[catKey].items.push({name:"New item",amount:0});
  renderFsSection(); saveFsData();
};
window.toggleFsEdit = () => requireEditPassword(() => { fsEditMode=!fsEditMode; renderFsSection(); });

function injectSections() {
  if (document.getElementById('private-wrapper')) {
    renderFsSection(); renderRpSection(); return;
  }
  const appEl = document.getElementById("app");
  if (!appEl) return;
  const wrapper = document.createElement("div");
  wrapper.id = "private-wrapper";
  wrapper.style.cssText = "margin-top:32px;";
  wrapper.innerHTML = `
    <div style="font-family:'DM Serif Display',serif;font-size:1.4rem;color:#0d0d0b;margin-bottom:16px;">Financial Summary</div>
    <div id="fs-container" style="background:#fff;border:1px solid rgba(0,0,0,0.13);border-radius:12px;overflow:hidden;margin-bottom:32px;"></div>
    <div style="font-family:'DM Serif Display',serif;font-size:1.4rem;color:#0d0d0b;margin-bottom:16px;">Retirement Plan</div>
    <div id="rp-container" style="background:#fff;border:1px solid rgba(0,0,0,0.13);border-radius:12px;overflow:hidden;margin-bottom:32px;"></div>`;
  appEl.appendChild(wrapper);
  Promise.all([loadFsData(), loadRpData()]).then(() => {
    renderFsSection(); renderRpSection();
  });
}

let rpEditMode = false;

function renderRpSection() {
  const container = document.getElementById("rp-container");
  if (!container) return;
  rpNeedsRefresh = false;

  const inf=0.025, r=0.05, re=0.025, btcR=0.08, yrs=25;
  const defl=Math.pow(1+inf,yrs);
  const fv=(pv,c,rate,n)=>pv*Math.pow(1+rate,n)+c*(Math.pow(1+rate,n)-1)/rate;
  const fmt=n=>"$"+Math.round(n).toLocaleString("en-CA");
  const fmtM=n=>fmt(n)+"/mo";

  const contrib=window.rpContrib||{rrsp:1250,tfsa:1208,rpp:500,resp:580};
  window.rpContrib=contrib;

  const bal=getRpBalances();
  const rrspNow =(bal.rrsp  !=null)?bal.rrsp  :70252;
  const tfsaNow =(bal.tfsa  !=null)?bal.tfsa  :6735;
  const rppNow  =(bal.rpp   !=null)?bal.rpp   :25979;
  const btcNow  =(bal.btc   !=null)?bal.btc   :12000;
  const indiaNow=(bal.india !=null)?bal.india :300000;
  const woodNow =(bal.wood  !=null)?bal.wood  :216667;
  const respNow =(bal.resp  !=null)?bal.resp  :39837;

  const rrsp65 =fv(rrspNow, contrib.rrsp*12,r,yrs);
  const tfsa65 =fv(tfsaNow, contrib.tfsa*12,r,yrs);
  const rpp65  =fv(rppNow,  contrib.rpp*12, r,yrs);
  const btc65  =btcNow   *Math.pow(1+btcR,yrs);
  const india65=indiaNow *Math.pow(1+re,yrs);
  const wood65 =woodNow  *Math.pow(1+re,yrs);
  const prim65 =1200000  *Math.pow(1+re,yrs);
  const liquid =rrsp65+tfsa65+rpp65+btc65+india65+wood65;
  const liqReal=liquid/defl;

  const nyr=12,vyr=14,cesg=1000,respAnnual=contrib.resp*12+cesg;
  const respNoor=fv(respNow,respAnnual,r,nyr);
  const cn=120000*Math.pow(1+inf,nyr);
  const cv=120000*Math.pow(1+inf,vyr);
  const rem=Math.max(respNoor-cn,0);
  const respVeer=fv(rem,respAnnual,r,2);
  const veerGap=Math.max(cv-respVeer,0);
  const topUp=veerGap>0?Math.round(veerGap*(r/12)/(Math.pow(1+r/12,vyr*12)-1)):0;

  const govtMo=3500;
  if(!window.retExpenses||window.retExpenses.length===0){
    window.retExpenses=[
      {cat:"Housing",                       note:"prop. tax + utilities + insurance",amt:1382},
      {cat:"Food & Groceries",              note:"2 people, no kids",               amt:800},
      {cat:"Auto",                          note:"insurance + gas, less driving",   amt:500},
      {cat:"Health & Medical",              note:"prescriptions, dental, vision",   amt:300},

  const expInp=(idx,val)=>rpEditMode
    ?`<input type="number" value="${val}" onchange="window.retExpenses[${idx}].amt=parseFloat(this.value)||0;renderRpSection();saveRpData();" onfocus="this.select()" style="background:#fff;border:1px solid rgba(26,82,128,0.3);border-radius:6px;font-size:16px;font-weight:600;font-family:inherit;color:#1a5280;width:90px;text-align:right;outline:none;padding:4px 8px;">`

             ["Woodstock 1/3",    wood65/defl,wood65]].map(([n,real,nom])=>`

            <span style="font-size:12px;color:#555;">${n}</span>
            <span style="font-size:12px;font-weight:600;color:#2a6e1e;text-align:right;">${fmt(real)}</span>

            <span style="font-size:13px;font-weight:700;color:#2a6e1e;text-align:right;">${fmt(liqReal)}</span>
            <span style="font-size:11px;color:#aaa;text-align:right;">${fmt(liquid)}</span>

        </div>
        <div style="padding:12px 14px;background:${surplus>0?'#f0f7ee':'#fff8f8'};">
          <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:${surplus>0?'#2a6e1e':'#a02020'};margin-bottom:8px;">Step 4 — Verdict</div>
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span style="font-size:13px;color:#555;">Portfolio you'll have</span><span style="font-size:13px;font-weight:600;color:#2a6e1e;">${fmt(liqReal)}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:13px;color:#555;">Portfolio you need</span><span style="font-size:13px;font-weight:600;color:#1a5280;">− ${fmt(needed4pct)}</span></div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;border-top:1px solid ${surplus>0?'rgba(42,110,30,0.15)':'rgba(160,32,32,0.15)'};">
            <span style="font-size:14px;font-weight:700;color:${surplus>0?'#2a6e1e':'#a02020'};">${surplus>0?'✓ On Track':'✗ Shortfall'}</span>
            <span style="font-family:'DM Serif Display',serif;font-size:1.5rem;color:${surplus>0?'#2a6e1e':'#a02020'};">${fmt(Math.abs(surplus))}</span>
          </div>
          <div style="font-size:11px;color:${surplus>0?'#6a9e6a':'#c06060'};margin-top:6px;">
            ${surplus>0?`Covers ${((liqReal/needed4pct)*100).toFixed(0)}% of what you need — ${fmt(surplus)} buffer`:'Increase contributions or reduce expenses'}
          </div>
        </div>
      </div>
    </div>

    <div style="border-bottom:1px solid rgba(0,0,0,0.08);">
      <div style="padding:14px 16px 6px;"><span style="font-size:14px;font-weight:600;color:#0d0d0b;">④ CPP + OAS</span><span style="font-size:11px;color:#2a6e1e;font-weight:500;margin-left:8px;">● Indexed to inflation forever</span></div>
      <div style="margin:0 16px 16px;background:#f8fff8;border:1px solid rgba(42,110,30,0.12);border-radius:8px;overflow:hidden;">
        ${[["CPP — Manny","$1,200/mo","Verify at My Service Canada"],["CPP — Rani","$900/mo","Verify at My Service Canada"],["OAS — Manny","$700/mo","Eligible at 65"],["OAS — Rani","$700/mo","Eligible at 65"]].map(([n,v,note])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:0.5px solid rgba(0,0,0,0.05);">
          <div><span style="font-size:13px;color:#333;">${n}</span><span style="font-size:11px;color:#aaa;margin-left:8px;">${note}</span></div>
          <span style="font-size:13px;font-weight:600;color:#2a6e1e;">${v}</span>

      </div>
      <div style="margin:0 16px 20px;border:1px solid rgba(0,0,0,0.08);border-radius:8px;overflow:hidden;">
        ${[["RESP balance today",fmt(respNow),""],
           ["Monthly contribution",rpEditMode?`<input type="number" value="${contrib.resp}" onchange="window.rpContrib['resp']=parseFloat(this.value)||0;renderRpSection();saveRpData();" onfocus="this.select()" style="background:#fff;border:1px solid rgba(26,82,128,0.3);border-radius:6px;font-size:16px;font-weight:600;font-family:inherit;color:#1a5280;width:90px;text-align:right;outline:none;padding:4px 8px;">`:fmt(contrib.resp)+"/mo",""],
           ["Annual CESG (govt)","$1,000/yr","20% match on $2,500/child"],
           ["Total going in /yr",fmt(respAnnual),"contributions + CESG"]]
